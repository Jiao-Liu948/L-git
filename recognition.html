<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>车牌识别工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background-color: #f5f5f5;
            padding: 15px;
            min-height: 100vh;
        }
        /* 主容器：左右布局 - 占满屏幕宽度 */
        .main-container {
            display: flex;
            gap: 15px;
            width: 100%;
            height: calc(100vh - 30px);
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* 左侧预览区（占比75%）- 拉满高度 */
        .preview-section {
            flex: 7.5;
            padding: 15px;
            background-color: #fafafa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100%;
        }
        .preview-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
            align-self: flex-start;
        }
        .camera-switch-container {
            align-self: flex-start;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        /* 滑动开关样式 */
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 30px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 30px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #409eff;
        }
        input:checked + .slider:before {
            transform: translateX(30px);
        }
        .switch-text {
            font-size: 16px;
            color: #333;
            font-weight: 500;
        }
        .preview-box {
            width: 100%;
            height: calc(100% - 80px);
            border: 2px solid #eee;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: white;
        }
        .preview-box img, .preview-box video, .preview-box canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .preview-placeholder {
            color: #999;
            font-size: 16px;
            text-align: center;
            padding: 15px;
        }

        /* 右侧操作栏（占比25%）- 填充空白 */
        .action-section {
            flex: 2.5;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-left: 1px solid #eee;
            height: 100%;
            justify-content: center;
        }
        .action-title {
            font-size: 24px;
            color: #333;
            text-align: center;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .file-type-tip {
            text-align: center;
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }
        /* 上传区域 - 放大填充 */
        .upload-area {
            border: 2px dashed #409eff;
            border-radius: 8px;
            padding: 40px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background-color: #f0f7ff;
            flex-shrink: 0;
        }
        .upload-area:hover {
            background-color: #e6f4ff;
            border-color: #337ecc;
        }
        .upload-text {
            color: #409eff;
            font-size: 16px;
            font-weight: 500;
        }
        #fileInput {
            display: none;
        }
        /* 识别按钮 - 放大填充 */
        .recognize-btn {
            padding: 18px 15px;
            background-color: #409eff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s;
            font-weight: 600;
            flex-shrink: 0;
        }
        .recognize-btn:hover {
            background-color: #337ecc;
        }
        .recognize-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        /* 结果区域 - 放大填充 */
        .result-section {
            padding: 25px 20px;
            border-radius: 8px;
            background-color: #f8f9fa;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 150px;
        }
        .result-title {
            font-size: 17px;
            color: #666;
            margin-bottom: 10px;
            text-align: center;
        }
        .result-content {
            font-size: 22px;
            text-align: center;
            font-weight: bold;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-status {
            font-size: 16px;
            text-align: center;
            margin: 10px 0;
            font-weight: 500;
        }
        .registered {
            color: #67c23a;
        }
        .unregistered {
            color: #f56c6c;
        }
        .success {
            color: #67c23a;
        }
        .error {
            color: #f56c6c;
        }
        .loading {
            color: #409eff;
        }
        .camera-result {
            color: #409eff;
        }
        /* 功能按钮组 */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .func-btn {
            flex: 1;
            padding: 12px 0;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .register-btn {
            background-color: #67c23a;
            color: white;
        }
        .register-btn:hover {
            background-color: #5daf34;
        }
        .gate-btn {
            background-color: #409eff;
            color: white;
        }
        .gate-btn:hover {
            background-color: #337ecc;
        }
        .func-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        /* 响应式适配（小屏幕变回上下布局） */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
                height: auto;
            }
            .preview-box {
                height: 400px;
            }
            .action-section {
                border-left: none;
                border-top: 1px solid #eee;
                padding: 20px 15px;
                height: auto;
            }
            .result-section {
                min-height: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- 左侧：预览区域 -->
        <div class="preview-section">
            <div class="preview-title">文件/摄像头预览</div>
            <!-- 摄像头开关 -->
            <div class="camera-switch-container">
                <label class="switch">
                    <input type="checkbox" id="cameraSwitch">
                    <span class="slider"></span>
                </label>
                <span class="switch-text">开启摄像头识别</span>
            </div>
            <div class="preview-box" id="previewBox">
                <div class="preview-placeholder">
                    请上传图片/视频文件，或开启摄像头识别<br>
                    支持格式：PNG/JPG/BMP/MP4/AVI/MOV
                </div>
            </div>
        </div>

        <!-- 右侧：操作栏 -->
        <div class="action-section">
            <div class="action-title">车牌识别</div>
            <div class="file-type-tip">
            </div>

            <!-- 上传区域 -->
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div class="upload-text">点击选择文件</div>
                <input type="file" id="fileInput" accept="image/jpeg,image/png,image/bmp,video/mp4,video/avi,video/mov" onchange="previewFile(this)">
            </div>

            <!-- 识别按钮 -->
            <button class="recognize-btn" id="recognizeBtn" onclick="recognizePlate()" disabled>开始识别</button>

            <!-- 结果区域 -->
            <div class="result-section">
                <div class="result-title">识别到车牌</div>
                <div class="result-content" id="resultContent">
                    未识别
                </div>
                <!-- 登记状态展示 -->
                <div class="register-status" id="registerStatus">
                    -
                </div>
                <!-- 功能按钮组：确认入库 + 开启闸口 -->
                <div class="btn-group">
                    <button class="func-btn register-btn" id="registerBtn" onclick="registerPlate()" disabled>确认入库</button>
                    <button class="func-btn gate-btn" id="gateBtn" onclick="openGate()" disabled>开启闸口</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        let selectedFile = null;
        let socket = null;
        let cameraActive = false;
        let currentPlate = ""; // 存储当前识别的车牌

        // 初始化WebSocket连接
        function initSocket() {
            socket = io('http://127.0.0.1:5000');
            
            // 接收摄像头帧和识别结果
            socket.on('camera_frame', (data) => {
                const previewBox = document.getElementById('previewBox');
                previewBox.innerHTML = `<img src="data:image/jpeg;base64,${data.frame}" alt="摄像头画面">`;
                
                // 更新识别结果和登记状态
                const resultContent = document.getElementById('resultContent');
                const registerStatus = document.getElementById('registerStatus');
                resultContent.textContent = `摄像头识别：${data.result}`;
                resultContent.className = "result-content camera-result";
                registerStatus.textContent = `登记状态：${data.register_status}`;
                registerStatus.className = `register-status ${data.register_status === '已登记' ? 'registered' : 'unregistered'}`;
                
                // 更新当前车牌，启用/禁用按钮
                currentPlate = data.result;
                updateFuncBtnStatus();
            });

            // 摄像头状态通知
            socket.on('camera_status', (data) => {
                console.log('摄像头状态：', data.msg);
                if (data.status === 'stopped') {
                    const previewBox = document.getElementById('previewBox');
                    previewBox.innerHTML = `
                        <div class="preview-placeholder">
                            请上传图片/视频文件，或开启摄像头识别<br>
                            支持格式：PNG/JPG/BMP/MP4/AVI/MOV
                        </div>
                    `;
                    const resultContent = document.getElementById('resultContent');
                    const registerStatus = document.getElementById('registerStatus');
                    resultContent.textContent = "未识别";
                    resultContent.className = "result-content";
                    registerStatus.textContent = "-";
                    registerStatus.className = "register-status";
                    currentPlate = "";
                    updateFuncBtnStatus();
                }
            });

            // 摄像头错误
            socket.on('camera_error', (data) => {
                alert('摄像头错误：' + data.msg);
                document.getElementById('cameraSwitch').checked = false;
                cameraActive = false;
                currentPlate = "";
                updateFuncBtnStatus();
            });
        }

        // 更新功能按钮状态（启用/禁用）
        function updateFuncBtnStatus() {
            const registerBtn = document.getElementById('registerBtn');
            const gateBtn = document.getElementById('gateBtn');
            // 仅当车牌有效时启用按钮
            const isPlateValid = currentPlate && !["未检测到车牌", "未识别出车牌", "车牌识别失败", "未识别"].includes(currentPlate);
            registerBtn.disabled = !isPlateValid;
            gateBtn.disabled = !isPlateValid;
        }

        // 页面加载时初始化Socket
        window.onload = function() {
            initSocket();
            
            // 摄像头开关事件
            const cameraSwitch = document.getElementById('cameraSwitch');
            cameraSwitch.addEventListener('change', function() {
                if (this.checked) {
                    // 开启摄像头
                    cameraActive = true;
                    socket.emit('start_camera');
                    // 禁用文件上传相关操作
                    document.getElementById('fileInput').disabled = true;
                    document.getElementById('recognizeBtn').disabled = true;
                } else {
                    // 关闭摄像头
                    cameraActive = false;
                    socket.emit('stop_camera');
                    // 启用文件上传相关操作
                    document.getElementById('fileInput').disabled = false;
                    if (selectedFile) {
                        document.getElementById('recognizeBtn').disabled = false;
                    }
                }
            });
        };

        // 预览上传的文件（自动适配图片/视频）
        function previewFile(input) {
            if (cameraActive) {
                alert('请先关闭摄像头再上传文件！');
                return;
            }
            
            const file = input.files[0];
            if (!file) return;
            
            selectedFile = file;
            const previewBox = document.getElementById('previewBox');
            const recognizeBtn = document.getElementById('recognizeBtn');
            const resultContent = document.getElementById('resultContent');
            const registerStatus = document.getElementById('registerStatus');

            // 重置结果
            resultContent.textContent = "未识别";
            resultContent.className = "result-content";
            registerStatus.textContent = "-";
            registerStatus.className = "register-status";
            currentPlate = "";
            updateFuncBtnStatus();

            // 根据文件类型渲染预览
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewBox.innerHTML = `<img src="${e.target.result}" alt="图片预览">`;
                }
                reader.readAsDataURL(file);
            } else if (file.type.startsWith('video/')) {
                previewBox.innerHTML = `<video controls src="${URL.createObjectURL(file)}"></video>`;
            }
            
            // 启用识别按钮
            recognizeBtn.disabled = false;
        }

        // 调用统一API识别车牌
        async function recognizePlate() {
            if (cameraActive) {
                alert('请先关闭摄像头再进行文件识别！');
                return;
            }
            
            if (!selectedFile) {
                alert("请先上传图片/视频文件！");
                return;
            }

            const recognizeBtn = document.getElementById('recognizeBtn');
            const resultContent = document.getElementById('resultContent');
            const registerStatus = document.getElementById('registerStatus');
            
            // 加载状态
            recognizeBtn.disabled = true;
            recognizeBtn.textContent = "识别中...";
            resultContent.textContent = "正在识别，请稍候...";
            resultContent.className = "result-content loading";
            registerStatus.textContent = "-";
            registerStatus.className = "register-status";

            try {
                // 构造FormData
                const formData = new FormData();
                formData.append('file', selectedFile);

                // 调用后端统一接口
                const response = await fetch('http://127.0.0.1:5000/api/recognize_all', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                if (data.code === 1) {
                    // 识别成功
                    resultContent.textContent = `${data.result}`;
                    resultContent.className = "result-content success";
                    registerStatus.textContent = `登记状态：${data.register_status}`;
                    registerStatus.className = `register-status ${data.register_status === '已登记' ? 'registered' : 'unregistered'}`;
                    recognizeBtn.textContent = "重新识别";
                    // 更新当前车牌，启用/禁用按钮
                    currentPlate = data.result;
                    updateFuncBtnStatus();
                } else {
                    // 识别失败
                    resultContent.textContent = `错误：${data.msg}`;
                    resultContent.className = "result-content error";
                    registerStatus.textContent = "-";
                    registerStatus.className = "register-status";
                    recognizeBtn.textContent = "开始识别";
                    currentPlate = "";
                    updateFuncBtnStatus();
                }
            } catch (e) {
                // 网络错误
                resultContent.textContent = `网络错误：${e.message}`;
                resultContent.className = "result-content error";
                registerStatus.textContent = "-";
                registerStatus.className = "register-status";
                recognizeBtn.textContent = "开始识别";
                currentPlate = "";
                updateFuncBtnStatus();
            } finally {
                // 恢复按钮可点击
                recognizeBtn.disabled = false;
            }
        }

        // 确认入库按钮事件
        async function registerPlate() {
            if (!currentPlate) {
                alert('无有效车牌可入库！');
                return;
            }
            
            try {
                const response = await fetch('http://127.0.0.1:5000/api/register_plate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ plate: currentPlate })
                });
                
                const data = await response.json();
                alert(data.msg);
                
                // 刷新登记状态
                if (data.code === 1) {
                    const registerStatus = document.getElementById('registerStatus');
                    registerStatus.textContent = "登记状态：已登记";
                    registerStatus.className = "register-status registered";
                }
            } catch (e) {
                alert(`入库请求失败：${e.message}`);
            }
        }

        // 开启闸口按钮事件（空按钮，可扩展）
        async function openGate() {
            if (!currentPlate) {
                alert('无有效车牌，无法开启闸口！');
                return;
            }
            
            try {
                const response = await fetch('http://127.0.0.1:5000/api/open_gate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ plate: currentPlate })
                });
                
                const data = await response.json();
                alert(data.msg);
            } catch (e) {
                alert(`闸口操作请求失败：${e.message}`);
            }
        }

        // 页面关闭时关闭摄像头
        window.onbeforeunload = function() {
            if (cameraActive) {
                socket.emit('stop_camera');
            }
        };
    </script>
</body>
</html>
